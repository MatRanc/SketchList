<!DOCTYPE html>
<!--
  palette.html - the Sketch List UI.

  Python -> JS :  palette.sendInfoToHTML('setEntities', '{"rows":[...]}')
                  arrives at window.fusionJavaScriptHandler.handle('setEntities', data).
  JS -> Python :  adsk.fusionSendData('select', '{"id":N}')  on a row click.
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sketch List</title>
  <style>
    :root {
      --bg: #ffffff; --fg: #1a1a1a; --accent: #0696d7;
      --border: #dddddd; --hover: #eef6fb; --muted: #888;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #2b2b2b; --fg: #e8e8e8; --accent: #2ba9e0;
        --border: #444; --hover: #3a3f44; --muted: #999;
      }
    }
    body {
      font-family: -apple-system, "Segoe UI", sans-serif;
      font-size: 13px; margin: 0; background: var(--bg); color: var(--fg);
    }
    #list { list-style: none; margin: 0; padding: 0; }
    #list li {
      padding: 6px 12px; border-bottom: 1px solid var(--border);
      cursor: pointer; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis;
    }
    #list li:hover { background: var(--hover); }
    #empty { padding: 16px 12px; color: var(--muted); }
  </style>
</head>
<body>
  <ul id="list"></ul>
  <div id="empty">No sketch open.</div>

  <script>
    const listEl = document.getElementById('list');
    const emptyEl = document.getElementById('empty');

    function render(rows) {
      listEl.innerHTML = '';
      emptyEl.style.display = rows.length ? 'none' : 'block';
      if (!rows.length) emptyEl.textContent = 'Sketch is empty.';
      for (const r of rows) {
        const li = document.createElement('li');
        li.textContent = r.label;
        li.title = r.label;
        li.onclick = () => adsk.fusionSendData('select', JSON.stringify({ id: r.id }));
        listEl.appendChild(li);
      }
    }

    // Tell Python we're ready; it replies with the initial rows (Python can't
    // push to us from inside this handler, so it returns them here instead).
    window.addEventListener('DOMContentLoaded', async () => {
      try {
        const reply = JSON.parse(await adsk.fusionSendData('ready', '{}'));
        render(reply.rows || []);
      } catch (e) {
        render([]);
      }
    });

    // Messages pushed FROM Python.
    window.fusionJavaScriptHandler = {
      handle: function (action, data) {
        try {
          if (action === 'setEntities') {
            render((JSON.parse(data || '{}').rows) || []);
          }
        } catch (e) {
          return 'FAILED: ' + e;
        }
        return 'OK';
      }
    };
  </script>
</body>
</html>
