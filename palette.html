<!DOCTYPE html>
<!--
  palette.html - the Sketch List UI.

  JS -> Python :  adsk.fusionSendData('scan', '{}')    -> reply '{"rows":[...]}' (polled)
                  adsk.fusionSendData('select', '{"id":N}')  on a row click.
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sketch List</title>
  <style>
    :root {
      --bg: #ffffff; --fg: #1a1a1a; --accent: #0696d7;
      --border: #dddddd; --hover: #eef6fb; --muted: #888;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #2b2b2b; --fg: #e8e8e8; --accent: #2ba9e0;
        --border: #444; --hover: #3a3f44; --muted: #999;
      }
    }
    body {
      font-family: -apple-system, "Segoe UI", sans-serif;
      font-size: 13px; margin: 0; background: var(--bg); color: var(--fg);
    }
    #list { list-style: none; margin: 0; padding: 0; }
    #list li {
      padding: 6px 12px; border-bottom: 1px solid var(--border);
      cursor: pointer; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis;
    }
    #list li:hover { background: var(--hover); }
    #empty { padding: 16px 12px; color: var(--muted); }
  </style>
</head>
<body>
  <ul id="list"></ul>
  <div id="empty">No sketch open.</div>

  <script>
    const listEl = document.getElementById('list');
    const emptyEl = document.getElementById('empty');

    function render(rows) {
      listEl.innerHTML = '';
      emptyEl.style.display = rows.length ? 'none' : 'block';
      if (!rows.length) emptyEl.textContent = 'Sketch is empty.';
      for (const r of rows) {
        const li = document.createElement('li');
        li.textContent = r.label;
        li.title = r.label;
        li.onclick = () => adsk.fusionSendData('select', JSON.stringify({ id: r.id }));
        listEl.appendChild(li);
      }
    }

    // Ask Python for the current rows and render only if they changed (so we
    // don't clobber :hover/clicks or flicker every tick). Returning the rows in
    // the reply is the one reliable Python->JS path; pushes get dropped when the
    // page isn't ready, which is what made the list need a second click.
    // ponytail: 400ms poll over the reliable reply channel sidesteps the event
    // race. Go event-driven only if this ever shows up in profiling.
    let lastJson = null;
    async function refresh() {
      try {
        const json = await adsk.fusionSendData('scan', '{}');
        if (json === lastJson) return;
        lastJson = json;
        render(JSON.parse(json).rows || []);
      } catch (e) { /* keep last render */ }
    }

    window.addEventListener('DOMContentLoaded', () => {
      refresh();
      setInterval(refresh, 400);
    });
  </script>
</body>
</html>
